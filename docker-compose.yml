version: '3.8'

services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./giftlink-backend
    ports:
      - "3060:3060"
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - JWT_SECRET=giftlink-secret-key
    depends_on:
      - mongodb

  frontend:
    build: ./giftlink-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_BACKEND_URL=http://localhost:3060
    depends_on:
      - backend

  sentiment:
    build: ./sentiment
    ports:
      - "3070:3070"

volumes:
  mongo-data:
